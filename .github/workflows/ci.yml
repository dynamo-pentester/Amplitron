name: CI - Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake \
          libportaudio2 portaudio19-dev \
          libsdl2-dev libgl1-mesa-dev libglu1-mesa-dev

    - name: Setup ImGui
      run: git clone --depth 1 --branch v1.90.1 https://github.com/ocornut/imgui.git external/imgui

    - name: Build
      run: |
        mkdir -p build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make -j$(nproc)

    - name: Run Tests
      run: cd build && ./amplitron-tests

  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install portaudio sdl2

    - name: Setup ImGui
      run: git clone --depth 1 --branch v1.90.1 https://github.com/ocornut/imgui.git external/imgui

    - name: Build
      run: |
        HOMEBREW_PREFIX=$(brew --prefix)
        mkdir -p build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release \
          -DPORTAUDIO_INCLUDE_DIRS="$HOMEBREW_PREFIX/include" \
          -DPORTAUDIO_LIBRARIES="$HOMEBREW_PREFIX/lib/libportaudio.dylib" \
          -DSDL2_INCLUDE_DIRS="$HOMEBREW_PREFIX/include/SDL2" \
          -DSDL2_LIBRARIES="$HOMEBREW_PREFIX/lib/libSDL2.dylib" \
          ..
        make -j$(sysctl -n hw.ncpu)

    - name: Run Tests
      run: cd build && ./amplitron-tests

  test-windows:
    name: Test on Windows
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-portaudio
          mingw-w64-x86_64-SDL2
          make
          git

    - name: Setup ImGui
      shell: msys2 {0}
      run: git clone --depth 1 --branch v1.90.1 https://github.com/ocornut/imgui.git external/imgui

    - name: Build
      shell: msys2 {0}
      run: |
        mkdir -p build && cd build
        cmake -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release ..
        make -j8

    - name: Run Tests
      shell: msys2 {0}
      run: cd build && ./amplitron-tests.exe
